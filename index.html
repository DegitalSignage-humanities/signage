<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="./manifest.webmanifest" />

  <title>Signage</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      cursor: none; /* サイネージならカーソル不要 */
    }
    .wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain; /* 画面いっぱいに“切らずに”表示（切りたいなら cover） */
      background: #000;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <!-- autoplayは“ミュート”がほぼ必須（ブラウザ仕様） -->
    <video
      id="v"
      src="./signage.mp4"
      autoplay
      muted
      loop
      playsinline
      preload="auto">
    </video>
  </div>

  <script>
    // Service Worker（PWA要件 & 安定化）
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js");
    }

    // 端末によっては初回だけ再生が止まることがあるので、保険でplay()を試す
    const v = document.getElementById("v");
    v.addEventListener("error", () => console.log("video error", v.error));
    v.addEventListener("canplay", async () => {
      try { await v.play(); } catch (e) {}
    });
  </script>
</body>
</html>
